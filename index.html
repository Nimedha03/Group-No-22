<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOCSHARE - All Your ICT Resources</title>
  <!-- FontAwesome for crisp vector icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="logo">
      <img src="image-removebg-preview.png" alt="DOCSHARE Logo" class="logo-image" width="200px">
    </div>
    <nav class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="browse.html">Browse</a>
      <a href="upload.html">Upload</a>
      <a href="about.html">About</a>
    </nav>
    <button class="btn-login">Login</button>
  </header>
  
  <!-- Hero Section & Search Bar -->
  <main class="hero-container">
    <section class="hero-content">
      <h1 class="hero-title">
        ALL YOUR<br>
        <span class="underline">ICT RESOURCES</span>.<br>
        <span class="underline">IN A SINGLE DIRECTORY</span>
      </h1>
      <p class="hero-subtitle">
        Streamlining BICT lecture assets, database guides, and exam archives into one powerful space.
      </p>

      <!-- Search Bar -->
      <div class="search-box">
        <input type="text" placeholder="Search" aria-label="Search">
        <button class="search-btn" aria-label="Submit search">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </section>
  </main>

  <!-- Footer Section -->
  <footer class="footer">
    <div class="footer-logo">
      <i class="fa-regular fa-file-lines"></i>
      <span>DOCSHARE</span>
    </div>

    <div class="footer-copyright">
      &copy; 2026 DOCSHARE. All rights reserved
    </div>

    <div class="footer-socials">
      <span>Follow us on</span>
      <div class="social-icons">
        <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" aria-label="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" aria-label="Website"><i class="fa-solid fa-globe"></i></a>
        <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>
    </div>
  </footer>

</body>
</html>
